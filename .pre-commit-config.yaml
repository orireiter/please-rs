# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
    -   id: trailing-whitespace
        exclude: ^README\.md$
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files
- repo: local
  hooks:
    - id: fmt
      name: fmt
      description: Format files with cargo fmt.
      entry: cargo fmt
      language: system
      types: [rust]
      args: ["--all", "--", "--check", "--color", "always"]
    - id: cargo-check
      name: cargo check
      description: Check the package for errors.
      entry: cargo check
      language: system
      types: [rust]
      pass_filenames: false
    - id: clippy
      name: clippy
      description: Lint rust sources
      entry: cargo clippy
      language: system
      args: ["--all-targets", "--", "-D", "warnings"]
      types: [rust]
      pass_filenames: false
    - id: tests
      name: tests
      description: Run tests
      entry: cargo test
      language: system
      types: [rust]
      pass_filenames: false
    - id: config-json-schema
      name: config-json-schema
      description: Generate the config JSON schema to validate it's not broken
      entry: cargo run
      args: ["--bin", "generate_config_schema"]
      language: system
      types: [rust]
